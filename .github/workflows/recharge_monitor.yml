name: Recharge Review Monitor

on:
  schedule:
    # 00:00 UTC (05:30 AM IST)
    # 12:00 UTC (05:30 PM IST)
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Restore review state
        uses: actions/cache@v4
        with:
          path: review_state.json
          key: review-state-${{ github.run_id }}
          restore-keys: |
            review-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python recharge_monitor.py

      - name: Save review state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: review_state.json
          key: review-state-${{ github.run_id }}

      - name: Commit state file to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add review_state.json
          # Only commit if there are changes to avoid errors
          git diff --cached --quiet || (git commit -m "chore: update review state [skip ci]" && git push)
